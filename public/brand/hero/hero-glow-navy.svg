<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1080 1920"
     preserveAspectRatio="xMidYMid slice">

  <defs>

    <!-- Background -->
    <radialGradient id="bgGlow"
        cx="50%" cy="48%" r="68%">
      <stop offset="0%" stop-color="#23497b" stop-opacity="0.88"/>
      <stop offset="28%" stop-color="#183a66" stop-opacity="0.72"/>
      <stop offset="55%" stop-color="#0e2241" stop-opacity="0.42"/>
      <stop offset="82%" stop-color="#07070a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#07070a"/>
    </radialGradient>

    <!-- Extra bloom -->
    <radialGradient id="innerBloom"
        cx="50%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#4d84c9" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#2f5b96" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2f5b96" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft vignette -->
    <radialGradient id="vignette"
        cx="50%" cy="50%" r="82%">
      <stop offset="65%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.82"/>
    </radialGradient>

    <!-- Subtle atmospheric noise -->
    <filter id="noise">
      <feTurbulence
          type="fractalNoise"
          baseFrequency="0.9"
          numOctaves="2"
          seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.015"/>
      </feComponentTransfer>
    </filter>

  </defs>

  <!-- Base -->
  <rect width="100%" height="100%" fill="#07070a"/>

  <!-- Main glow -->
  <rect width="100%" height="100%" fill="url(#bgGlow)"/>

  <!-- Inner bloom -->
  <rect width="100%" height="100%" fill="url(#innerBloom)"/>

  <!-- Atmospheric noise -->
  <rect width="100%" height="100%"
        filter="url(#noise)"
        opacity="0.6"/>

  <!-- Edge darkening -->
  <rect width="100%" height="100%"
        fill="url(#vignette)"/>

</svg>